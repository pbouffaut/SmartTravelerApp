name: SmartTraveler
options:
  bundleIdPrefix: com.smarttraveler
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.9"

targets:
  SmartTraveler:
    type: application
    platform: iOS
    sources:
      - SmartTraveler
    info:
      path: SmartTraveler/Info.plist
    settings:
      base:
        INFOPLIST_FILE: SmartTraveler/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.smarttraveler.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Smart Traveler
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.travel"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Smart Traveler uses your location to detect your current country, show local currency, time zone, news, and emergency information."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Smart Traveler uses speech recognition to let you speak text for translation."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Smart Traveler needs microphone access for voice-to-text translation."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
